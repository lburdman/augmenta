services:
  privacy-service:
    build:
      context: ./services/privacy-service-py
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - PORT=8000
    volumes:
      - ./services/privacy-service-py:/app

  ingestion-go:
    build:
      context: ./services/ingestion-go
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      - PORT=8080
      - PRIVACY_SERVICE_URL=http://privacy-service:8000
      - LLM_GATEWAY_URL=http://llm-gateway-go:7000
      - FLOWS_CONFIG_PATH=/configs/flows.yaml
    volumes:
      - ./configs:/configs
    depends_on:
      - privacy-service
      - llm-gateway-go

  llm-gateway-go:
    build:
      context: ./services/llm-gateway-go
      dockerfile: Dockerfile
    ports:
      - "7000:7000"
    environment:
      - PORT=7000

  downstream-mock:
    build:
      context: ./services/downstream-mock
      dockerfile: Dockerfile
    ports:
      - "9000:9000"
    environment:
      - PORT=9000
