services:
  privacy-service:
    build:
      context: ./services/privacy-service-py
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - PORT=8000
    volumes:
      - ./services/privacy-service-py:/app

  ingestion-go:
    build:
      context: ./services/ingestion-go
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      - PORT=8080
      - FLOWS_CONFIG_PATH=/configs/flows.yaml
      - PRIVACY_SERVICE_URL=http://privacy-service:8000
      - LLM_GATEWAY_URL=http://llm-gateway-go:7001
      - DYNAMODB_ENDPOINT=http://dynamodb:8000
      - VAULT_BACKEND=dynamodb
      - VAULT_TABLE=augmenta_vault
      - VAULT_TIMEOUT_MS=2000
      - PRIVACY_TIMEOUT_MS=2000
      - LLM_TIMEOUT_MS=3500
      - AUDIT_ADMIN_ENABLED=true
    volumes:
      - ./configs:/configs
    depends_on:
      - privacy-service
      - llm-gateway-go
      - dynamodb

  llm-gateway-go:
    build:
      context: ./services/llm-gateway-go
      dockerfile: Dockerfile
    ports:
      - "7001:7001"
    environment:
      - PORT=7001

  downstream-mock:
    build:
      context: ./services/downstream-mock
      dockerfile: Dockerfile
    ports:
      - "9000:9000"
    environment:
      - PORT=9000

  dynamodb:
    image: amazon/dynamodb-local:latest
    command: "-jar DynamoDBLocal.jar -inMemory -sharedDb"
    ports:
      - "8001:8000"
